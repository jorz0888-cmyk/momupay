<html lang="ja">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA — manifest <link> is injected by vite-plugin-pwa at build
         time (it emits /manifest.webmanifest). theme-color stays here so
         iOS Safari can paint the title bar before JS runs. -->
    <meta name="theme-color" content="#2C2418" />
    <meta name="description" content="サロンとお客様を、もっと軽やかに。" />

    <!-- iOS home-screen install -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MomuPay" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <title>MomuPay</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
